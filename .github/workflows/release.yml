name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'  # Format standard pour Scotter (sans préfixe 'v')

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Get release version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Build with version script
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh
        
      - name: Generate changelog
        id: changelog
        run: |
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:'- %s' $(git describe --tags --abbrev=0 HEAD^)..HEAD | grep -v 'Merge pull request' | grep -v 'Merge branch' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ## Installation
            ```
            # Install directly
            curl -sSL https://github.com/Caezarr-OSS/Scotter/releases/download/${{ steps.get_version.outputs.VERSION }}/scotter-${{ runner.os }}-${{ runner.arch }} -o /usr/local/bin/scotter
            chmod +x /usr/local/bin/scotter
            
            # Or build from source
            git clone https://github.com/Caezarr-OSS/Scotter.git
            cd Scotter
            go install .
            ```
          files: |
            scotter
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
